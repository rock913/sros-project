# Production Docker Compose Configuration
#
# This file is intended for production deployments. It builds the backend service
# using the production Dockerfile (Dockerfile.prod), ensuring that the application
# code is included directly in the image. Key characteristics:
# - No volume mounts for application code, creating an immutable container.
# - Database port is not exposed to the host machine for better security.
# - Does not use hot-reloading.

volumes:
  langgraph-data:
    driver: local
services:
  langgraph-redis:
    image: docker.io/redis:6
    container_name: langgraph-redis
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
  langgraph-postgres:
    image: pgvector/pgvector:pg16
    container_name: langgraph-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    # The database port does not need to be exposed to the host in production,
    # as only the 'langgraph-api' service needs to access it.
    # ports:
    #   - "5433:5432"
  langgraph-api:
    # For production, it's better to use a specific Dockerfile.
    # Assuming a Dockerfile.prod exists in the backend directory.
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    container_name: langgraph-api
    ports:
      - "8121:8000"
    # In production, the code should be part of the image.
    # Remove the volume mount to ensure the container is immutable.
    # volumes:
    #   - ./backend:/deps/backend
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_started
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      REDIS_URI: redis://langgraph-redis:6379
      POSTGRES_URI: postgresql://postgres:postgres@langgraph-postgres:5432/postgres
