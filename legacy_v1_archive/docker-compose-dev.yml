# Development Docker Compose Configuration
#
# This file is intended for local development. It provides a convenient setup
# with hot-reloading, access to service ports, and mounted volumes.
# - Uses the development Dockerfile (Dockerfile.dev).
# - Mounts the local source code, enabling hot-reloading for the backend.
# - Exposes the database port to the host machine for easier debugging.

volumes:
  langgraph-data:
    driver: local
  qdrant-data:
    driver: local
  ollama-data:
    driver: local
services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always
  langgraph-redis:
    image: docker.io/redis:6
    container_name: langgraph-redis
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
  langgraph-postgres:
    image: pgvector/pgvector:pg16
    container_name: langgraph-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
  langgraph-api:
    image: gemini-fullstack-langgraph-quickstart/langgraph-api:dev
    build:
      context: .
      dockerfile: ./backend/Dockerfile.dev
    container_name: langgraph-api
    ports:
      - "8121:8000"
    env_file:
      - .env
    volumes:
      - .:/deps
    working_dir: /deps
    # By setting entrypoint to an empty string, we override the
    # default ENTRYPOINT from the base langgraph-api image.
    # This allows our custom command to be executed directly.
    entrypoint: ''
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_started
    environment:
      LANGCHAIN_TRACING_V2: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      # For Aider (Qwen/OpenAI)
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URI: redis://langgraph-redis:6379
      POSTGRES_URI: postgresql://postgres:postgres@langgraph-postgres:5432/postgres
      PYTHONPATH: /deps/backend/src
      # Force provider fallback to direct Gemini API (avoids Vertex AI ADC credential requirement)
      GENERATION_LLM_PROVIDER: gemini
      # LangFuse Observability Configuration
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://localhost:3000}  
    command: >
      bash -c "uvicorn agent.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /deps/backend/src --timeout-keep-alive 300"
  vscode-dev:
    image: gemini-fullstack-langgraph-quickstart/vscode-dev:dev
    build:
      context: .
      dockerfile: ./vscode-extension/Dockerfile.dev
    container_name: vscode-dev
    # Mount the entire project directory to ensure all files are accessible
    volumes:
      - .:/workspaces/gemini-fullstack-langgraph-quickstart:cached
    # Set the default working directory inside the container
    working_dir: /workspaces/gemini-fullstack-langgraph-quickstart
    # Keep the container running in the background
    command: tail -f /dev/null
  aider-agent:
    build:
      context: .
      dockerfile: backend/Dockerfile.aider
    container_name: aider-agent
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_BASE: ${DASHSCOPE_API_BASE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANG: C.UTF-8
      MCP_PORT: 3001
      LOAD_BUSINESS_TOOLS: "false"  # Control Plane mode: no business tools, only meta-tools
      # LangSmith Observability Configuration
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-auto-researcher-agent}
      # LangFuse Observability Configuration
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    # Run the MCP server for Aider integration
    command: python -m aider_mcp_launcher
    stdin_open: true
    tty: true
    restart: no  # Disable restart to see errors in logs
  langgraph-studio:
    image: luisdocker269/langgraph-studio:latest
    container_name: langgraph-studio
    ports:
      - "1984:1984"
    environment:
      # LangGraph Studio will connect to our local services
      LANGGRAPH_DATABASE_CONNECTION_URI: postgresql://postgres:postgres@langgraph-postgres:5432/postgres
      LANGGRAPH_REDIS_CONNECTION_URI: redis://langgraph-redis:6379
      # Import our langgraph configuration
      LANGGRAPH_CONFIGURATION_FILE: backend/langgraph.json
      # Optional: Enable CORS for local development
      LANGGRAPH_DEVELOPMENT: "true"
      # Observability (inherits from .env if set)
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-auto-researcher-studio}
      # LangFuse (optional, will fall back to LangSmith if not configured)
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      # Configuration for LangGraph Studio
      PORT: 1984
    volumes:
      - .:/app/workspace
    working_dir: /app/workspace
    depends_on:
      langgraph-postgres:
        condition: service_started
      langgraph-redis:
        condition: service_healthy
    profiles:
      - studio  # Can be enabled with: docker compose --profile studio up langgraph-studio
    restart: unless-stopped
